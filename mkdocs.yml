site_name: "NF Consumidor — Plataforma de Inteligência Fiscal Cidadã"
site_description: "Documentação técnica executável da plataforma GovTech de transparência fiscal."
site_author: "Equipe de Engenharia"
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  custom_dir: overrides
  language: pt-BR
  logo: assets/brasao.svg
  favicon: assets/brasao.svg
  font:
    text: Source Sans 3
    code: Roboto Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Alternar para modo escuro
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Alternar para modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/govbr.css

extra:
  social: []
  generator: false

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: "Nesta página"

nav:
  - Início: index.md
  - Arquitetura:
    - architecture/index.md
    - Visão Geral: architecture/overview.md
    - Bounded Contexts (DDD): architecture/bounded-contexts.md
    - Decisões de Design (ADR):
      - ADR-001 — Modular Monolith: architecture/adr/ADR-001-modular-monolith.md
      - ADR-002 — OCR Assíncrono (Celery): architecture/adr/ADR-002-async-ocr-celery.md
      - ADR-003 — Motor Preditivo (Croston): architecture/adr/ADR-003-croston-predictive.md
  - Dicionário de Dados:
    - data-dictionary/index.md
    - Entidades: data-dictionary/entities.md
    - Modelo Tributário: data-dictionary/tax-model.md
    - Integração IBPT: data-dictionary/ibpt-integration.md
  - Testes:
    - testing/index.md
    - Cobertura: testing/coverage-report.md
  - Análise Técnica:
    - analysis/index.md
    - Complexidade do Projeto: analysis/complexity.md
    - Dificuldades e Obstáculos: analysis/difficulties.md
    - Matriz de Riscos: analysis/risk-matrix.md
    - Lições Aprendidas: analysis/lessons-learned.md
  - Devlog:
    - devlog/index.md
    - "2026-05-28 — Value Objects": devlog/2026-05-28-value-objects.md
    - "2026-06-03 — Testes de Value Objects": devlog/2026-06-03-value-objects-tests.md
  - Referências Bibliográficas: references.md
