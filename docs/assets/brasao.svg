<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Círculo externo azul marinho -->
  <circle cx="50" cy="50" r="48" fill="#071D41" stroke="#C9A84C" stroke-width="2.5"/>
  <!-- Estrela central dourada (5 pontas) -->
  <polygon points="50,15 57,38 80,38 62,53 69,76 50,62 31,76 38,53 20,38 43,38"
           fill="#C9A84C"/>
  <!-- Faixa horizontal verde -->
  <rect x="18" y="56" width="64" height="10" rx="2" fill="#168821" opacity="0.9"/>
  <!-- Texto NF no centro -->
  <text x="50" y="64" text-anchor="middle" font-family="Source Sans 3, Arial, sans-serif"
        font-size="7" font-weight="700" fill="#FFFFFF" letter-spacing="1">NF</text>
</svg>
